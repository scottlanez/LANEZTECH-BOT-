<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANEZTECH MD V3</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Poppins;
  background: #050814;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 70px;
  height: 70px;
  margin: auto;
  border-radius: 50%;
  background: linear-gradient(45deg,#00ff9c,#00c3ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:black;
}

.title {
  font-size: 22px;
  font-weight: 700;
  margin-top: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 15px;
}

.card {
  background: #0b1224;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
}

/* INPUT */
input {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #070d1a;
  color: white;
}

/* BUTTON */
button {
  width: 95%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#00ff9c,#00c3ff);
  font-weight: bold;
}

/* CODE */
.code {
  font-size: 24px;
  font-weight: bold;
  margin-top: 10px;
  color: #00ff9c;
}

/* LOG */
.log {
  background: black;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  font-size: 12px;
  color: #00ff9c;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">LT</div>
  <div class="title">⚡ LANEZTECH MD V3</div>
</div>

<!-- STATS -->
<div class="grid">
  <div class="card">
    ⏱ Uptime
    <h3 id="uptime">0s</h3>
  </div>

  <div class="card">
    💾 Memory
    <h3 id="memory">0MB</h3>
  </div>

  <div class="card">
    📱 Sessions
    <h3 id="sessions">0</h3>
  </div>

  <div class="card">
    🟢 Status
    <h3>Online</h3>
  </div>
</div>

<!-- PAIR -->
<div class="card" style="margin:15px;">
  <h3>Pair WhatsApp</h3>

  <input id="number" placeholder="256XXXXXXXXX">

  <button onclick="pair()">Generate Code</button>

  <div class="code" id="code"></div>
</div>

<div class="log" id="log">System Ready...</div>

<script>

// =========================
// LIVE STATS
// =========================
async function loadStats(){
  const res = await fetch("/api/stats");
  const data = await res.json();

  document.getElementById("uptime").innerText = data.uptime;
  document.getElementById("memory").innerText = data.memory;
  document.getElementById("sessions").innerText = data.sessions;
}

setInterval(loadStats, 2000);
loadStats();

// =========================
// PAIRING
// =========================
async function pair(){
  const number = document.getElementById("number").value;
  const codeBox = document.getElementById("code");
  const log = document.getElementById("log");

  log.innerText = "Sending request...";

  const res = await fetch("/api/pair", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ number })
  });

  const data = await res.json();

  if(data.success){
    codeBox.innerText = data.code;
    log.innerText = "Code generated ✔";
  } else {
    log.innerText = data.message;
  }
}

</script>

</body>
</html>
