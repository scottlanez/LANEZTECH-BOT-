<!DOCTYPE html>
<html>
<head>
  <title>LANEZTECH MD</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f14;
      color: white;
      text-align: center;
    }

    .box {
      margin-top: 80px;
    }

    input {
      padding: 12px;
      width: 80%;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #00ff88;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      margin-top: 40px;
      padding: 20px;
      background: #111827;
      border-radius: 15px;
      width: 85%;
      margin-left: auto;
      margin-right: auto;
    }

    .code {
      font-size: 28px;
      color: #00ff88;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>⚡ LANEZTECH MD</h1>
    <p>Enter number to get pairing code</p>

    <input id="num" placeholder="256XXXXXXXXX" />
    <br>

    <button onclick="pair()">GET PAIRING CODE</button>

    <div class="card">
      <p>Status:</p>
      <div id="status">Waiting...</div>
      <div class="code" id="code"></div>
    </div>
  </div>

<script>
async function pair() {
  const number = document.getElementById("num").value;

  document.getElementById("status").innerText = "Connecting...";

  const res = await fetch("/pair", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ number })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("status").innerText =
      "Check Render logs for your pairing code";
  } else {
    document.getElementById("status").innerText = data.error;
  }
}
</script>

</body>
</html>
