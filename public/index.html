<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ultra Pro Dashboard</title>  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui, -apple-system, Segoe UI, Roboto;
    }

    body{
      min-height:100vh;
      background: radial-gradient(circle at top, #0f172a, #05070d);
      color:#e5e7eb;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background: rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    .title{
      text-align:center;
      font-size:20px;
      font-weight:700;
      letter-spacing:1px;
      margin-bottom:5px;
      color:#22c55e;
    }

    .subtitle{
      text-align:center;
      font-size:12px;
      opacity:0.7;
      margin-bottom:20px;
    }

    .card{
      background: rgba(255,255,255,0.03);
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.06);
      margin-bottom:14px;
    }

    .status{
      display:flex;
      justify-content:space-between;
      font-size:13px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#22c55e;
      display:inline-block;
      margin-right:6px;
      box-shadow:0 0 10px #22c55e;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.1);
      background:#0b1220;
      color:white;
      outline:none;
      margin-top:10px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:12px;
      border:none;
      border-radius:10px;
      background: linear-gradient(90deg,#22c55e,#06b6d4);
      color:black;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.02);
    }

    .output{
      text-align:center;
      margin-top:12px;
      font-size:14px;
      color:#93c5fd;
      word-break:break-all;
    }

    .small{
      font-size:11px;
      opacity:0.6;
      text-align:center;
      margin-top:6px;
    }
  </style></head><body>
  <div class="container">
    <div class="title">⚡ ULTRA PRO DASHBOARD</div>
    <div class="subtitle">WhatsApp Pairing Control Panel</div><div class="card">
  <div class="status">
    <span><span class="dot"></span>System Online</span>
    <span>Latency: 38ms</span>
  </div>
</div>

<div class="card">
  <label>Enter Number</label>
  <input id="number" placeholder="256XXXXXXXXX" />
  <button onclick="generate()">Generate Pairing Code</button>

  <div class="output" id="result">Waiting...</div>
  <div class="small">Make sure WhatsApp is ready</div>
</div>

  </div><script>
function generate(){
  const num = document.getElementById('number').value;
  const out = document.getElementById('result');

  if(!num || num.length < 8){
    out.innerText = "Enter valid number";
    return;
  }

  // fake UI simulation (backend will replace this)
  const code = Math.random().toString(36).substring(2, 10).toUpperCase();

  out.innerHTML = `Pairing Code: <b>${code}</b>`;
}
</script></body>
</html>
