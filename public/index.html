<!DOCTYPE html>
<html>
<head>
  <title>LANEZTECH PRO</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="header">
    <h1>⚡ LANEZTECH PRO</h1>
    <p>Advanced WhatsApp Control Panel</p>
  </div>

  <div class="grid">

    <div class="card">
      <h3>System Status</h3>
      <p class="green">● Online</p>
      <p>Latency: 42ms</p>
    </div>

    <div class="card">
      <h3>Sessions</h3>
      <p>Active: 1</p>
    </div>

  </div>

  <div class="card main">

    <h2>Link WhatsApp</h2>

    <input id="num" placeholder="256XXXXXXXXX">

    <button onclick="getCode()">Generate Pairing Code</button>

    <div class="result">
      <h3>Pairing Code</h3>
      <div id="code">------</div>
      <p id="status">Waiting...</p>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
