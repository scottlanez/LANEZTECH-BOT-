<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANEZTECH MD</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0b1220, #020617);
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 30px rgba(0,255,150,0.08);
}

.title {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
}

.green { color: #00ff99; }

.stats {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
}

.box {
  background: #0f172a;
  padding: 10px;
  border-radius: 10px;
  width: 48%;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#00ff99,#00ccff);
  font-weight: bold;
  cursor: pointer;
}

.result {
  text-align: center;
  margin-top: 15px;
  font-size: 18px;
}

.log {
  margin-top: 20px;
  background: black;
  padding: 10px;
  border-radius: 10px;
  font-size: 12px;
  height: 120px;
  overflow-y: auto;
  color: #00ff99;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

  <div class="title">⚡ <span class="green">LANEZTECH</span> MD</div>

  <div class="stats">
    <div class="box">
      ⏱ <div id="uptime">0s</div>
    </div>
    <div class="box">
      📡 <div id="requests">0</div>
    </div>
  </div>

  <input id="number" placeholder="Enter number (2567XXXXXXX)">

  <button onclick="pair()">Generate Pair Code</button>

  <div class="result" id="result">Waiting...</div>

</div>

<div class="log" id="log"></div>

</div>

<script>

function log(msg){
  const el = document.getElementById('log');
  el.innerHTML += "> " + msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

async function pair(){
  const number = document.getElementById('number').value;

  document.getElementById('result').innerText = "Generating...";

  log("Sending request...");

  try {
    const res = await fetch('/api/pair', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ number })
    });

    const data = await res.json();

    if(data.success){
      document.getElementById('result').innerText = data.code;
      log("Code generated ✔");
    } else {
      document.getElementById('result').innerText = "Failed";
      log("Error: " + data.message);
    }

  } catch (err) {
    document.getElementById('result').innerText = "Server error";
    log("Server error");
  }
}

// LIVE STATS
async function loadStats(){
  const res = await fetch('/api/stats');
  const data = await res.json();

  document.getElementById('uptime').innerText = data.uptime + "s";
  document.getElementById('requests').innerText = data.requests;
}

setInterval(loadStats, 2000);
loadStats();

</script>

</body>
</html>
