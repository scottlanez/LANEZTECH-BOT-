<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANEZTECH MD</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0a0f1f, #020617);
  color: white;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 25px rgba(0,255,150,0.1);
}

.title {
  font-size: 24px;
  font-weight: bold;
}

.green {
  color: #00ff99;
}

.status {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
  margin: 15px 0;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#00ff99,#00ccff);
  font-weight: bold;
  cursor: pointer;
}

.code {
  margin-top: 15px;
  text-align: center;
  font-size: 20px;
}

.logs {
  margin-top: 20px;
  background: black;
  padding: 10px;
  border-radius: 10px;
  height: 120px;
  overflow-y: auto;
  font-size: 12px;
  color: #00ff99;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <div class="title">⚡ <span class="green">LANEZTECH</span> MD</div>
  <small>Elite WhatsApp Control Panel</small>

  <div class="status">
    <span>🟢 Online</span>
    <span id="latency">-- ms</span>
  </div>

  <div class="status">
    <span>⏱ <span id="uptime">0s</span></span>
    <span>📱 <span id="sessions">0</span></span>
  </div>

  <input id="number" placeholder="2567XXXXXXXX">

  <button onclick="pair()">Generate Pairing Code</button>

  <div class="code" id="code">Waiting...</div>

</div>

<div class="logs" id="logs"></div>

</div>

<script>
let startTime = Date.now();

function log(msg) {
  const logs = document.getElementById('logs');
  logs.innerHTML += "> " + msg + "<br>";
  logs.scrollTop = logs.scrollHeight;
}

// uptime
setInterval(() => {
  let sec = Math.floor((Date.now() - startTime)/1000);
  document.getElementById('uptime').innerText = sec + "s";
}, 1000);

// fake latency (can connect real later)
setInterval(() => {
  document.getElementById('latency').innerText = Math.floor(Math.random()*50)+" ms";
}, 2000);

async function pair() {
  const number = document.getElementById('number').value;
  const codeBox = document.getElementById('code');

  codeBox.innerText = "Generating...";
  log("Pairing request sent...");

  try {
    const res = await fetch('/api/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ number })
    });

    const data = await res.json();

    if (data.success) {
      codeBox.innerText = data.code;
      log("Pairing code generated ✔");
    } else {
      codeBox.innerText = "Failed";
      log("Error: " + data.message);
    }

  } catch (err) {
    codeBox.innerText = "Server Error";
    log("Server error...");
  }
}
</script>

</body>
</html>
