<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANEZTECH MD</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* MAIN CARD */
.container {
  width: 95%;
  max-width: 420px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,255,150,0.15);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* HEADER */
.title {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 10px;
}

.title span {
  color: #22c55e;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 20px;
}

/* STATUS BAR */
.status {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.dot {
  height: 10px;
  width: 10px;
  background: #22c55e;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  box-shadow: 0 0 10px #22c55e;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #020617;
  color: white;
  font-size: 16px;
  margin-bottom: 15px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, #22c55e, #06b6d4);
  color: black;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(34,197,94,0.6);
}

/* RESULT */
.result {
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* LOADING */
.loader {
  margin-top: 10px;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">⚡ <span>LANEZTECH</span> MD</div>
  <div class="subtitle">WhatsApp Pairing Control Panel</div>

  <div class="status">
    <div><span class="dot"></span>System Online</div>
    <div id="latency">Latency: -- ms</div>
  </div>

  <input id="number" placeholder="Enter number (2567XXXXXXXX)" />

  <button onclick="pair()">Generate Pairing Code</button>

  <div class="loader" id="loading"></div>
  <div class="result" id="result"></div>

</div>

<script>
async function pair() {
  const number = document.getElementById('number').value;
  const result = document.getElementById('result');
  const loading = document.getElementById('loading');

  result.innerText = "";
  loading.innerText = "Connecting to server...";

  try {
    const start = Date.now();

    const res = await fetch('/api/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ number })
    });

    const data = await res.json();

    const latency = Date.now() - start;
    document.getElementById('latency').innerText = "Latency: " + latency + " ms";

    loading.innerText = "";

    if (data.success) {
      typeCode("PAIR CODE: " + data.code);
    } else {
      result.innerText = "❌ " + data.message;
    }

  } catch (err) {
    loading.innerText = "";
    result.innerText = "❌ Server error";
  }
}

/* TYPE EFFECT */
function typeCode(text) {
  const el = document.getElementById('result');
  el.innerText = "";
  let i = 0;

  const interval = setInterval(() => {
    el.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 40);
}
</script>

</body>
</html>
