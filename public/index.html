<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LANEZTECH MD</title>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#050b18;
    color:#fff;
  }

  .container{
    max-width:420px;
    margin:auto;
    padding:20px;
  }

  /* HEADER */
  .logo{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:20px;
    flex-direction:column;
  }

  .circle{
    width:70px;
    height:70px;
    border-radius:50%;
    background:linear-gradient(45deg,#00ff99,#00ccff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:22px;
    color:#000;
  }

  h1{
    margin:10px 0 0;
    font-size:22px;
  }

  .subtitle{
    font-size:13px;
    opacity:0.7;
  }

  /* CARD */
  .card{
    background:#0b1224;
    padding:15px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 0 20px rgba(0,255,170,0.1);
  }

  .status{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:#111a33;
    border-radius:12px;
  }

  .dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:limegreen;
    margin-right:8px;
  }

  .row{
    display:flex;
    align-items:center;
  }

  input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    background:#111a33;
    color:#fff;
    outline:none;
  }

  button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ff99,#00ccff);
    font-weight:bold;
    cursor:pointer;
  }

  .code{
    text-align:center;
    font-size:20px;
    margin-top:15px;
    letter-spacing:2px;
  }

  .log{
    background:#000;
    padding:10px;
    border-radius:10px;
    margin-top:15px;
    font-size:13px;
    color:#00ff99;
    height:80px;
    overflow:auto;
  }

  .commands{
    margin-top:15px;
    background:#0b1224;
    padding:10px;
    border-radius:10px;
  }

  .cmd{
    padding:8px;
    background:#111a33;
    margin-top:5px;
    border-radius:8px;
  }
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <div class="circle">LT</div>
    <h1>⚡ LANEZTECH MD</h1>
    <div class="subtitle">Elite WhatsApp Bot Control Panel</div>
  </div>

  <!-- STATUS -->
  <div class="card">
    <div class="status">
      <div class="row">
        <div class="dot"></div>
        <span>System Online</span>
      </div>
      <span id="ping">-- ms</span>
    </div>
  </div>

  <!-- PAIRING -->
  <div class="card">
    <h3>Pair WhatsApp</h3>
    <input id="number" placeholder="2567XXXXXXXX"/>
    <button onclick="generate()">Generate Pair Code</button>

    <div class="code" id="code">------</div>

    <div class="log" id="log">
      > Waiting for request...
    </div>
  </div>

  <!-- COMMANDS -->
  <div class="card">
    <h3>Bot Commands</h3>
    <div class="commands">
      <div class="cmd">.menu</div>
      <div class="cmd">.ping</div>
      <div class="cmd">.alive</div>
      <div class="cmd">.owner</div>
    </div>
  </div>

</div>

<script>
async function generate(){
  const number = document.getElementById("number").value;
  const codeBox = document.getElementById("code");
  const log = document.getElementById("log");

  log.innerHTML = "> Sending request...";

  try{
    const res = await fetch("/api/pair",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ number })
    });

    const data = await res.json();

    if(data.success){
      codeBox.innerText = data.code;
      log.innerHTML = "> Code generated ✓";
    }else{
      log.innerHTML = "> Failed to generate code";
    }

  }catch(err){
    log.innerHTML = "> Server error";
  }
}
</script>

</body>
</html>
