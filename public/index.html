<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LANEZTECH MD</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body{
      background:#070b18;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
      padding:20px;
    }.container{
  width:100%;
  max-width:420px;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(45deg,#00ffa3,#00c2ff);
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0 auto 10px;
  font-weight:bold;
  color:#000;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.subtitle{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

.card{
  background:#0e1630;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 15px rgba(0,255,200,0.08);
}

.status{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
}

.dot{
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  display:inline-block;
  margin-right:5px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#0b1224;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00ffa3,#00c2ff);
  font-weight:bold;
  cursor:pointer;
}

.result{
  text-align:center;
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
  letter-spacing:2px;
}

.log{
  background:#000;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:12px;
  color:#00ff99;
  height:100px;
  overflow:auto;
}

.section-title{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}

  </style>
</head>
<body><div class="container">  <div class="header">
    <div class="logo">LT</div>
    <div class="title">⚡ LANEZTECH MD</div>
    <div class="subtitle">Elite WhatsApp Bot Control Panel</div>
  </div>  <div class="card">
    <div class="status">
      <div><span class="dot"></span>System Online</div>
      <div id="ping">-- ms</div>
    </div>
  </div>  <div class="card">
    <div class="section-title">Pair WhatsApp</div>
    <input id="number" placeholder="256XXXXXXXXX" />
    <button onclick="generateCode()">Generate Pair Code</button>
    <div class="result" id="result">----</div><div class="log" id="log">
  > System ready...\n
</div>

  </div>  <div class="card">
    <div class="section-title">Bot Commands</div>
    <div>.menu</div>
    <div>.ping</div>
    <div>.alive</div>
    <div>.owner</div>
  </div></div><script>
async function generateCode(){
  const number = document.getElementById("number").value;
  const result = document.getElementById("result");
  const log = document.getElementById("log");

  if(!number){
    result.innerText = "Enter number";
    return;
  }

  log.innerText += "> Sending request...\n";
  result.innerText = "Loading...";

  try{
    const res = await fetch("/api/pair",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({number})
    });

    const data = await res.json();

    if(data.success && data.code){
      result.innerText = data.code;
      log.innerText += "> Code generated ✔\n";
    }else{
      result.innerText = "Failed";
      log.innerText += "> Failed to generate\n";
    }

  }catch(e){
    result.innerText = "Error";
    log.innerText += "> Server error\n";
  }
}
</script></body>
</html>
