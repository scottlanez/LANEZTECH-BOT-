<!DOCTYPE html>
<html>
<head>
    <title>LANEZTECH Pairing</title>
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 80px;
        }
        input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            color: lime;
        }
    </style>
</head>
<body>

<h1>LANEZTECH PAIRING SYSTEM</h1>

<input id="number" placeholder="Enter number (e.g 2567xxxxxx)" />
<br>
<button onclick="pair()">Generate Code</button>

<p id="result"></p>

<script>
async function pair() {
    const number = document.getElementById("number").value;

    const res = await fetch("/pair", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ number })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        data.code ? "CODE: " + data.code : "ERROR: " + data.error;
}
</script>

</body>
</html>
