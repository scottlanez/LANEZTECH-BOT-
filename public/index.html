<!DOCTYPE html>
<html>
<head>
  <title>LANEZTECH MD</title>
</head>
<body style="background:#0b1220;color:white;text-align:center;padding-top:50px;">

<h1>⚡ LANEZTECH MD</h1>

<input id="number" placeholder="2567XXXXXXXX" />
<br><br>

<button onclick="pair()">PAIR DEVICE</button>

<h2 id="result"></h2>

<script>
async function pair() {
  const number = document.getElementById('number').value;

  document.getElementById('result').innerText = "Connecting...";

  const res = await fetch('/api/pair', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ number })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById('result').innerText =
      "PAIR CODE: " + data.code;
  } else {
    document.getElementById('result').innerText =
      "FAILED: " + data.message;
  }
}

// LIVE STATUS
setInterval(async () => {
  const res = await fetch('/api/state');
  const data = await res.json();

  console.log("STATUS:", data);
}, 3000);
</script>

</body>
</html>
