<!DOCTYPE html>
<html>
<head>
  <title>LANEZTECH BOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    input {
      padding: 10px;
      width: 250px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      color: #38bdf8;
    }
  </style>
</head>
<body>

<h1>🤖 LANEZTECH BOT</h1>
<p>Enter your number (e.g 2567XXXXXXXX)</p>

<input type="text" id="number" placeholder="2567XXXXXXXX">
<br>
<button onclick="getCode()">Get Pairing Code</button>

<div id="result"></div>

<script>
async function getCode() {
  const number = document.getElementById("number").value

  document.getElementById("result").innerText = "⏳ Generating..."

  const res = await fetch("/pair", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ number })
  })

  const data = await res.json()

  if (data.code) {
    document.getElementById("result").innerText =
      "🔥 CODE: " + data.code
  } else {
    document.getElementById("result").innerText =
      "❌ Error: " + data.error
  }
}
</script>

</body>
</html>
