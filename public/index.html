<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANEZTECH MD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#020617;
  color:white;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.header h1{
  font-size:26px;
}

.header span{color:#22c55e}

/* CARDS GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:20px;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

/* MAIN PANEL */
.panel{
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:10px;
  text-align:center;
}

/* COMMANDS */
.commands{
  background:#0f172a;
  padding:15px;
  border-radius:15px;
}

.commands h3{
  margin-bottom:10px;
}

.cmd{
  background:#020617;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <h1>⚡ <span>LANEZTECH</span> MD</h1>
  <p>Advanced WhatsApp Control Panel</p>
</div>

<!-- STATS -->
<div class="grid">
  <div class="card">
    <h3 id="uptime">0s</h3>
    <p>Uptime</p>
  </div>
  <div class="card">
    <h3 id="sessions">0</h3>
    <p>Sessions</p>
  </div>
</div>

<!-- PAIR PANEL -->
<div class="panel">
  <input id="number" placeholder="2567XXXXXXXX">
  <button onclick="pair()">Generate Pairing Code</button>
  <div class="result" id="result"></div>
</div>

<!-- COMMANDS -->
<div class="commands">
  <h3>🤖 Bot Commands</h3>
  <div class="cmd">.menu</div>
  <div class="cmd">.ping</div>
  <div class="cmd">.alive</div>
  <div class="cmd">.owner</div>
</div>

<script>
// PAIR
async function pair(){
  const number = document.getElementById('number').value;

  document.getElementById('result').innerText = "Connecting...";

  const res = await fetch('/api/pair',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({number})
  });

  const data = await res.json();

  if(data.success){
    document.getElementById('result').innerText = "CODE: "+data.code;
  } else {
    document.getElementById('result').innerText = "FAILED";
  }
}

// LIVE STATS
async function loadStats(){
  const res = await fetch('/api/stats');
  const data = await res.json();

  document.getElementById('uptime').innerText = formatTime(data.uptime);
  document.getElementById('sessions').innerText = data.sessions;
}

// FORMAT TIME
function formatTime(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return m+"m "+s+"s";
}

// AUTO REFRESH
setInterval(loadStats,3000);
loadStats();
</script>

</body>
</html>
