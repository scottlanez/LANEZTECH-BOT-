<!DOCTYPE html>
<html>
<head>
  <title>LANEZTECH Pairing</title>
</head>
<body style="background:#111;color:white;text-align:center;padding-top:80px;">

<h1>LANEZTECH PAIRING</h1>

<input id="number" placeholder="2567xxxxxx" style="padding:10px;width:200px;">
<br><br>
<button onclick="pair()">Generate Code</button>

<p id="result"></p>

<script>
async function pair() {
  const number = document.getElementById("number").value;

  const res = await fetch("/pair", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ number })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    data.code ? "CODE: " + data.code : "ERROR: " + data.error;
}
</script>

</body>
</html>
